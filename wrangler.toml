name = "kellys-appliance-nextjs"
compatibility_date = "2025-10-03"
compatibility_flags = ["nodejs_compat"]

# Next.js static export output
pages_build_output_dir = "out"

# Public environment variables (visible in client-side code)
# These are available at build time for Next.js static export
[vars]
NEXT_PUBLIC_GA_MEASUREMENT_ID = "G-6NW7LJG197"
NEXT_PUBLIC_GTM_ID = "GTM-TNTGZKKZ"
NEXT_PUBLIC_GOOGLE_ADS_ID = "AW-10866866733"
# NEXT_PUBLIC_GOOGLE_MAPS_API_KEY lives as an encrypted Secret in the Cloudflare
# dashboard (feeds CI builds) and in .env.local (feeds local `npm run deploy`
# builds). It is inlined into static JS at build time, so it must NOT be a [vars]
# runtime binding here — doing so collides with the dashboard Secret of the same name.

# Email configuration for contact & appointment forms (via Resend)
CONTACT_EMAIL_TO = "kellysappliance@gmail.com"
CONTACT_EMAIL_FROM = "noreply@kellysappliancerepair.com"
CONTACT_EMAIL_FROM_NAME = "Kelly's Appliance"
